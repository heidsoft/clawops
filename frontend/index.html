<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 部署管理系统</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .status-badge { padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.875rem; font-weight: 600; }
        .status-running { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="card" style="max-width: 600px; width: 100%; padding: 3rem;">
        <h1 class="text-center mb-4" style="color: #667eea;"><i class="fas fa-rocket"></i> OpenClaw 部署管理系统</h1>
        
        <div class="alert alert-info">
            <i class="fas fa-info-circle"></i> <strong>系统状态：</strong>
            <span class="status-badge status-running"><i class="fas fa-circle"></i> 运行中</span>
        </div>
        
        <div class="mb-4">
            <h5><i class="fas fa-server"></i> API 端点</h5>
            <ul class="list-group">
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    部署列表
                    <a href="/api/v1/deployments" target="_blank" class="btn btn-sm btn-outline-primary">测试</a>
                </li>
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    健康检查
                    <a href="/api/v1/health" target="_blank" class="btn btn-sm btn-outline-success">测试</a>
                </li>
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    监控数据
                    <a href="/api/v1/deployments/1/metrics" target="_blank" class="btn btn-sm btn-outline-info">测试</a>
                </li>
            </ul>
        </div>
        
        <div class="text-center">
            <p class="text-muted">前端开发服务器：<code>http://localhost:5173</code></p>
            <p class="text-muted">后端 API 服务器：<code>http://localhost:8080</code></p>
        </div>
    </div>
    
    <script>
        // 测试 API 连接
        fetch('/api/v1/deployments')
            .then(r => r.json())
            .then(d => console.log('API 连接成功:', d))
            .catch(e => console.error('API 连接失败:', e));
    </script>
</body>
</html>
